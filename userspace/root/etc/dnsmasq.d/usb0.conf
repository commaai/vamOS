interface=usb0
bind-interfaces
dhcp-range=10.10.10.11,10.10.10.20,255.255.255.0,12h
# Don't advertise a default gateway — prevents the host from routing
# all traffic over USB and losing internet connectivity
dhcp-option=3
# Don't advertise DNS servers — prevents the host from sending DNS
# queries over USB instead of its existing network
dhcp-option=6
